<!DOCTYPE html>
<html>
<head>
    <title>Keydown and Keyup Example</title>
    <style>
        #de {
            width: 200px;
            height: 100px;
            text-align: center;
            line-height: 100px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Press and Release Keys</h1>
<p>Press and hold a key to see the background change to green. Release the key to change it to another color.</p>

<div id="de">Press and hold a key</div>

<script>
    const deElement = document.getElementById("de");

    document.addEventListener("keydown", function(event) {
        deElement.style.backgroundColor = "green";
    });

    document.addEventListener("keyup", function(event) {
        deElement.style.backgroundColor = "blue"; // Change to a different color on keyup
    });
</script>

</body>
</html>
